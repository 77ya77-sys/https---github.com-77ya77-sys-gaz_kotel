<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Политика конфиденциальности | BoilerFix</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .privacy-page {
            padding: 80px 0;
            background: var(--bg-main);
            min-height: 100vh;
        }

        .privacy-content {
            background: var(--card-bg);
            padding: 40px;
            border-radius: 20px;
            box-shadow: var(--card-shadow);
            max-width: 800px;
            margin: 0 auto;
        }

        .privacy-content h1 {
            margin-bottom: 24px;
            color: var(--text-main);
        }

        .privacy-content h2 {
            margin-top: 32px;
            margin-bottom: 16px;
            color: var(--text-main);
            font-size: 1.25rem;
        }

        .privacy-content p {
            margin-bottom: 16px;
            color: var(--text-muted);
            line-height: 1.6;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 24px;
            color: var(--primary-color);
            font-weight: 600;
        }

        .demo-alert {
            display: flex;
            align-items: flex-start;
            gap: 16px;
            background-color: #fefce8;
            border: 1px solid #fef08a;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 32px;
            text-align: left;
        }

        .demo-alert-icon {
            flex-shrink: 0;
            color: #eab308;
            margin-top: 2px;
        }

        .demo-alert-text {
            font-size: 0.8125rem;
            color: #854d0e;
            line-height: 1.5;
        }

        @media (max-width: 768px) {
            .privacy-content {
                padding: 24px;
            }

            .demo-alert {
                margin-bottom: 24px;
                padding: 12px;
            }
        }
    </style>
</head>

<body>
    <div class="privacy-page">
        <div class="container text-center">
            <a href="index.html" class="back-link">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="19" y1="12" x2="5" y2="12"></line>
                    <polyline points="12 19 5 12 12 5"></polyline>
                </svg>
                Вернуться на главную
            </a>

            <div class="privacy-content">
                <h1>Политика конфиденциальности</h1>
